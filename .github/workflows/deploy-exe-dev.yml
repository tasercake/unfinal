name: Deploy to exe.dev

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.UNFINAL_DEPLOY_SSH_PRIVATE_KEY }}

      - name: Verify SSH host key fingerprint
        run: |
          set -euo pipefail
          deploy_target="${{ secrets.EXE_DEV_HOST }}"
          host="${deploy_target#*@}"
          expected="${{ secrets.EXE_DEV_SSH_RSA_SHA256_FINGERPRINT }}"

          if [[ -z "$expected" ]]; then
            echo "ERROR: EXE_DEV_SSH_RSA_SHA256_FINGERPRINT secret is not set." >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          known_hosts_file="$(mktemp)"
          ssh-keyscan -t rsa -p 22 "$host" > "$known_hosts_file" 2>/dev/null
          fingerprint=$(ssh-keygen -lf "$known_hosts_file" -E sha256 | awk 'NR == 1 {print $2}')
          if [[ -z "$fingerprint" || "$fingerprint" != "$expected" ]]; then
            echo "ERROR: SSH RSA host key fingerprint mismatch!" >&2
            echo "Got:      ${fingerprint:-<none>}" >&2
            exit 1
          fi
          cat "$known_hosts_file" >> ~/.ssh/known_hosts
          echo "SSH RSA host key fingerprint verified."

      - name: Run remote deploy script with Litestream restore validation
        run: |
          ssh -o StrictHostKeyChecking=yes -p 22 "${{ secrets.EXE_DEV_HOST }}" '
            set -euo pipefail
            cd /home/exedev/unfinal
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            chmod +x ./deploy-exe-dev.sh
            export CLERK_SECRET_KEY="${{ secrets.CLERK_SECRET_KEY }}"
            ./deploy-exe-dev.sh
          '
