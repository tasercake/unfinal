name: Deploy to exe.dev

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.UNFINAL_DEPLOY_SSH_PRIVATE_KEY }}

      - name: Verify SSH host key fingerprint
        run: |
          set -euo pipefail
          host="${{ secrets.EXE_DEV_HOST }}"
          mkdir -p ~/.ssh
          ssh-keyscan -p 22 "$host" >> ~/.ssh/known_hosts 2>/dev/null
          fingerprint=$(ssh-keygen -lf ~/.ssh/known_hosts -E sha256 | grep "$host" | awk '{print $2}')
          expected="SHA256:JJOP/lwiBGOMilfONPWZCXUrfK154cnJFXcqlsi6lPo"
          if [[ "$fingerprint" != "$expected" ]]; then
            echo "ERROR: SSH host key fingerprint mismatch!" >&2
            echo "Expected: $expected" >&2
            echo "Got:      $fingerprint" >&2
            exit 1
          fi
          echo "SSH host key fingerprint verified."

      - name: Run remote deploy script with Litestream restore validation
        run: |
          ssh -o StrictHostKeyChecking=yes -p 22 "${{ secrets.EXE_DEV_HOST }}" '
            set -euo pipefail
            cd /home/exedev/unfinal
            git fetch origin main
            git reset --hard origin/main
            git clean -fd
            chmod +x ./deploy-exe-dev.sh
            export CLERK_SECRET_KEY="${{ secrets.CLERK_SECRET_KEY }}"
            ./deploy-exe-dev.sh
          '
