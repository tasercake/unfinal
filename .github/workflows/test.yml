name: Tests

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19'
          otp-version: '28'

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Prepare test database
        run: mkdir -p tmp && MIX_ENV=test mix ecto.create

      - name: Run schema migrations
        run: MIX_ENV=test mix ecto.migrate

      - name: Verify schema dump is current
        run: |
          MIX_ENV=test mix ecto.dump --dump-path priv/repo/schema.sql
          sed -i "s/INSERT INTO schema_migrations VALUES(20260630000000,'[^']*');/INSERT INTO schema_migrations VALUES(20260630000000,'0000-00-00T00:00:00');/" priv/repo/schema.sql
          git diff --exit-code priv/repo/schema.sql

      - name: Run tests
        run: mix test
